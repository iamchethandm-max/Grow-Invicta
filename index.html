<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Safeguard against third-party and sandboxed environments attempting to monkeypatch window.fetch
      try {
        const originalFetch = window.fetch;
        let customFetch = originalFetch;
        Object.defineProperty(window, 'fetch', {
          configurable: true,
          enumerable: true,
          get: () => customFetch,
          set: (v) => { customFetch = v; }
        });
      } catch (err) {
        console.warn("Failed to apply shadow setter wrapper for window.fetch:", err);
      }
    </script>
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
